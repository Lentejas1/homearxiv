<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HomeArxiv - Gestor de Papers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, sans-serif;
    background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff;
    padding: 1rem 2rem; display: flex; align-items: center; gap: 1.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .header h1 { font-size: 1.4rem; font-weight: 600; }
  .header .subtitle { color: #a0aec0; font-size: .85rem; }
  .header button {
    margin-left: auto; background: #2d6a4f; color: #fff; border: none;
    padding: .5rem 1rem; border-radius: 6px; cursor: pointer; font-size: .85rem;
  }
  .header button:hover { background: #40916c; }
  .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem; }
  .filters {
    background: #fff; border-radius: 10px; padding: 1rem 1.5rem;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 1.5rem;
    display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
  }
  .filters input, .filters select {
    padding: .5rem .75rem; border: 1px solid #d1d5db; border-radius: 6px;
    font-size: .9rem; outline: none;
  }
  .filters input:focus, .filters select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .filters input { flex: 1; min-width: 200px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }
  .card {
    background: #fff; border-radius: 10px; padding: 1.25rem;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: box-shadow .15s;
    position: relative;
  }
  .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); }
  .card .title {
    font-size: 1rem; font-weight: 600; margin-bottom: .4rem;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta {
    font-size: .82rem; color: #6b7280; margin-bottom: .6rem;
  }
  .card .meta .author { color: #3b82f6; }
  .card .meta .year { background: #e5e7eb; padding: .1rem .4rem; border-radius: 4px; font-size: .75rem; }
  .card .filename {
    font-size: .75rem; color: #9ca3af; margin-bottom: .75rem;
    font-family: monospace; word-break: break-all;
  }
  .tags {
    display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .75rem;
  }
  .tag {
    background: #e0e7ff; color: #4338ca; font-size: .75rem;
    padding: .15rem .6rem; border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: .25rem;
  }
  .tag .remove { cursor: pointer; font-weight: bold; opacity: .6; }
  .tag .remove:hover { opacity: 1; }
  .tag-add {
    background: transparent; border: 1px dashed #93c5fd; color: #3b82f6;
    font-size: .75rem; padding: .15rem .6rem; border-radius: 999px;
    cursor: pointer;
  }
  .tag-add:hover { background: #eff6ff; }
  .card-actions {
    display: flex; gap: .5rem; margin-top: .75rem; padding-top: .75rem;
    border-top: 1px solid #f3f4f6;
  }
  .card-actions button {
    padding: .35rem .75rem; border-radius: 6px; font-size: .8rem;
    border: none; cursor: pointer;
  }
  .btn-open { background: #1a1a2e; color: #fff; }
  .btn-open:hover { background: #16213e; }
  .btn-edit { background: #f3f4f6; color: #374151; }
  .btn-edit:hover { background: #e5e7eb; }
  .btn-delete { background: #fef2f2; color: #dc2626; }
  .btn-delete:hover { background: #fee2e2; }
  .empty {
    text-align: center; padding: 3rem; color: #9ca3af; grid-column: 1 / -1;
  }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    justify-content: center; align-items: center; z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 1.5rem 2rem;
    width: 90%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 1rem; }
  .modal label { display: block; font-size: .85rem; color: #374151; margin-bottom: .25rem; }
  .modal input { width: 100%; padding: .5rem .75rem; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: .9rem; margin-bottom: .75rem; outline: none; }
  .modal input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .modal .buttons { display: flex; gap: .5rem; justify-content: flex-end; margin-top: .5rem; }
  .modal .buttons button { padding: .5rem 1rem; border-radius: 6px; border: none; cursor: pointer; }
  .modal .btn-save { background: #1a1a2e; color: #fff; }
  .modal .btn-cancel { background: #f3f4f6; color: #374151; }
  .tag-input-row { display: flex; gap: .35rem; }
  .tag-input-row input { flex: 1; margin-bottom: 0; }
  .tag-input-row button { background: #e0e7ff; border: none; color: #4338ca;
    padding: .35rem .6rem; border-radius: 6px; cursor: pointer; font-size: .8rem; }
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1a2e;
    color: #fff; padding: .75rem 1.25rem; border-radius: 8px;
    font-size: .85rem; opacity: 0; transition: opacity .3s; z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  @media (max-width: 640px) {
    .container { padding: 1rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>📄 HomeArxiv</h1>
  <span class="subtitle">Gestor local de papers y documentos</span>
  <button onclick="scanPapers()">🔄 Escanear carpeta</button>
</div>

<div class="container">
  <div class="filters">
    <input type="text" id="searchInput" placeholder="Buscar por título, autor o archivo..." oninput="render()">
    <select id="tagFilter" onchange="render()">
      <option value="">Todas las etiquetas</option>
    </select>
  </div>

  <div class="grid" id="docGrid"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Editar documento</h2>
    <input type="hidden" id="editId">
    <label>Título</label>
    <input type="text" id="editTitle">
    <label>Autor</label>
    <input type="text" id="editAuthor">
    <label>Año</label>
    <input type="number" id="editYear">
    <div class="buttons">
      <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let documents = [];
let allTags = [];

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  return r.json();
}

async function scanPapers() {
  const data = await fetchJSON("/api/scan", { method: "POST" });
  toast(`Escaneados: ${data.added} nuevo(s)`);
  await loadTags();
  await render();
}

async function loadTags() {
  allTags = await fetchJSON("/api/tags");
  const sel = document.getElementById("tagFilter");
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todas las etiquetas</option>';
  for (const t of allTags) {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    if (t === cur) opt.selected = true;
    sel.appendChild(opt);
  }
}

async function render() {
  const search = document.getElementById("searchInput").value;
  const tag = document.getElementById("tagFilter").value;
  const params = new URLSearchParams();
  if (search) params.set("search", search);
  if (tag) params.set("tag", tag);
  documents = await fetchJSON(`/api/documents?${params}`);
  const grid = document.getElementById("docGrid");
  grid.innerHTML = "";
  if (documents.length === 0) {
    grid.innerHTML = '<div class="empty">📂 No se encontraron documentos. Añade PDFs a la carpeta <strong>papers/</strong> y escanea.</div>';
    return;
  }
  for (const doc of documents) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="title">${esc(doc.title || doc.filename)}</div>
      <div class="meta">
        ${doc.author ? `<span class="author">${esc(doc.author)}</span>` : ""}
        ${doc.author && doc.year ? " · " : ""}
        ${doc.year ? `<span class="year">${doc.year}</span>` : ""}
      </div>
      <div class="filename">${esc(doc.filename)}</div>
      <div class="tags" id="tags-${doc.id}"></div>
      <div class="card-actions">
        <button class="btn-open" onclick="openPdf(${doc.id})">📖 Abrir</button>
        <button class="btn-edit" onclick="editDoc(${doc.id})">✏️ Editar</button>
        <button class="btn-delete" onclick="deleteDoc(${doc.id})">🗑️</button>
      </div>
    `;
    grid.appendChild(card);
    renderTags(doc);
  }
}

function renderTags(doc) {
  const container = document.getElementById(`tags-${doc.id}`);
  container.innerHTML = "";
  const tagList = doc.tags ? doc.tags.split(", ").filter(Boolean) : [];
  for (const t of tagList) {
    const span = document.createElement("span");
    span.className = "tag";
    span.innerHTML = `${esc(t)} <span class="remove" onclick="removeTag(${doc.id},'${esc(t)}')">×</span>`;
    container.appendChild(span);
  }
  // Add tag input
  const addSpan = document.createElement("span");
  addSpan.className = "tag-add";
  addSpan.textContent = "+ etiqueta";
  addSpan.onclick = () => showAddTagInput(doc.id, addSpan);
  container.appendChild(addSpan);
}

function showAddTagInput(docId, el) {
  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "nueva etiqueta";
  input.style.cssText = "width:100px;font-size:.75rem;padding:.1rem .4rem;border:1px solid #93c5fd;border-radius:999px;outline:none;";
  el.replaceWith(input);
  input.focus();
  input.onkeydown = async (e) => {
    if (e.key === "Enter" && input.value.trim()) {
      await addTag(docId, input.value.trim());
      await render();
    } else if (e.key === "Escape") {
      await render();
    }
  };
  input.onblur = async () => {
    if (input.value.trim()) {
      await addTag(docId, input.value.trim());
    }
    await render();
  };
}

async function openPdf(id) {
  await fetchJSON(`/api/open/${id}`);
}

async function deleteDoc(id) {
  if (!confirm("¿Eliminar este documento de la base de datos?")) return;
  await fetchJSON(`/api/documents/${id}`, { method: "DELETE" });
  toast("Documento eliminado");
  await render();
}

async function addTag(docId, name) {
  await fetchJSON(`/api/documents/${docId}/tags`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ tag: name }),
  });
}

async function removeTag(docId, name) {
  await fetchJSON(`/api/documents/${docId}/tags/${encodeURIComponent(name)}`, { method: "DELETE" });
  await render();
}

function editDoc(id) {
  const doc = documents.find(d => d.id === id);
  if (!doc) return;
  document.getElementById("editId").value = doc.id;
  document.getElementById("editTitle").value = doc.title || "";
  document.getElementById("editAuthor").value = doc.author || "";
  document.getElementById("editYear").value = doc.year || "";
  document.getElementById("editModal").classList.add("active");
}

async function saveEdit() {
  const id = document.getElementById("editId").value;
  const data = {
    title: document.getElementById("editTitle").value.trim(),
    author: document.getElementById("editAuthor").value.trim(),
    year: document.getElementById("editYear").value ? parseInt(document.getElementById("editYear").value) : null,
  };
  await fetchJSON(`/api/documents/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data),
  });
  closeEditModal();
  toast("Documento actualizado");
  await render();
}

function closeEditModal() {
  document.getElementById("editModal").classList.remove("active");
}

// Close modal on overlay click
document.getElementById("editModal").onclick = (e) => {
  if (e.target === e.currentTarget) closeEditModal();
};

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove("show"), 2500);
}

// Init
(async () => {
  await loadTags();
  await render();
})();
</script>
</body>
</html>
